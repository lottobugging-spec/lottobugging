<!DOCTYPE html>
<html lang="ko-KR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>로또 분석 필터 가이드 | 22단계 정밀 통계 시스템 - 로또버깅</title>
    <meta name="description" content="로또버깅이 제공하는 22가지 과학적 분석 필터를 확인하세요. 핫넘버, 콜드넘버, AC값, 패턴 분석 등 당첨 확률을 높이는 모든 기술이 담겨 있습니다.">
    <link rel="stylesheet" href="style.css?v=3.2">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .filters-hero { 
            text-align: center; 
            padding: 60px 0; 
            background: var(--bg-secondary); 
            border-bottom: 1px solid var(--border-color); 
            width: 100%;
        }
        .filters-hero .hero-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .filters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        .filter-card { 
            background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 15px; padding: 25px; 
            cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; gap: 15px;
            text-decoration: none; color: inherit;
        }
        .filter-card:hover { transform: translateY(-5px); border-color: var(--accent-blue); box-shadow: var(--card-shadow); }
        .f-num { font-family: var(--font-display); font-weight: 700; color: var(--accent-blue); font-size: 1.2rem; }
        .f-title { font-weight: 700; font-size: 1.1rem; color: var(--text-main); }
        .f-desc { font-size: 0.9rem; color: var(--text-dim); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .f-tag { align-self: flex-start; background: rgba(9, 105, 218, 0.1); color: var(--accent-blue); font-size: 0.75rem; padding: 4px 10px; border-radius: 50px; font-weight: 600; }
        
    </script>

    <header class="site-header">
        <div class="top-bar container">
            <div class="logo-area">
                <h1><a href="/" style="text-decoration:none;">LOTTO<span class="highlight">BUGGING</span></a></h1>
            </div>
            <div class="header-controls">
                <div class="lang-dropdown-container">
                    <button class="lang-dropdown-btn">
                        <span id="langDisplay" data-i18n="lang_display">언어 선택</span>
                        <span class="arrow">▼</span>
                    </button>
                    <div class="lang-dropdown-menu">
                        <div class="lang-option" onclick="setLanguage('ko')">🇰🇷 한국어 (KO)</div>
                        <div class="lang-option" onclick="setLanguage('en')">🇺🇸 English (EN)</div>
                        <div class="lang-option" onclick="setLanguage('ja')">🇯🇵 日本語 (JA)</div>
                    </div>
                </div>
                <div class="theme-toggle">
                    <button id="themeBtn" class="theme-btn" aria-label="다크 모드 전환">
                        <span id="themeIcon">☀️</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="main-header container">
            <div class="tagline-area">
                <p class="tagline" data-i18n="tagline">Data Science Solution for Lottery Probability</p>
            </div>
            <button class="menu-toggle" id="menuToggle" aria-label="메뉴 열기">
                <span class="hamburger"></span>
            </button>
            <nav class="top-nav" aria-label="주요 서비스 탐색">
                <a href="columns.html" data-i18n="nav_columns">통계 칼럼</a>
                <a href="methodology.html" data-i18n="nav_methodology">분석 방법론</a>
                <a href="filters.html" class="active" data-i18n="nav_filters">필터 가이드</a>
                <a href="about.html" data-i18n="nav_about">서비스 안내</a>
            </nav>
        </div>
    </header>

    <section class="filters-hero">
        <div class="hero-content">
            <h2 style="font-size: 2.2rem; margin-bottom: 15px; color: #3182f6;">22단계 정밀 분석 필터</h2>
            <p style="color: var(--text-dim); max-width: 700px; margin: 0 auto;">로또버깅의 인공지능 엔진은 아래 22가지 통계 필터링 과정을 거쳐 최적의 조합을 산출합니다. 각 필터의 과학적 원리를 확인해 보세요.</p>
        </div>
    </section>

    <div class="container">
        <main class="filters-grid" id="filtersContainer">
            <!-- JS로 22개 카드 생성 -->
        </main>

        <footer class="main-footer">
            <p>&copy; 2026 LOTTOBUGGING Lab. All Rights Reserved.</p>
        </footer>
    </div>

    <script type="module">
        import { FILTER_DETAILS, STATE } from './main.js';
        window.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('filtersContainer');
            if (typeof FILTER_DETAILS !== 'undefined' && container) {
                FILTER_DETAILS.forEach((f) => {
                    const card = document.createElement('a');
                    const isAI = f.id === 22;
                    card.className = 'filter-card';
                    if (isAI) card.style.borderColor = '#ec5b13';
                    card.href = `filter-detail.html?id=${f.id}`;
                    const name = f.name[STATE.currentLang] || f.name['ko'];
                    const desc = f.desc ? (f.desc[STATE.currentLang] || f.desc['ko']) : "No description available.";
                    card.innerHTML = `
                        <div class="f-num" style="${isAI ? 'color: #ec5b13;' : ''}">Step ${String(f.id).padStart(2, '0')}</div>
                        <div class="f-title">${name}</div>
                        <div class="f-desc">${desc}</div>
                        <div class="f-tag" style="${isAI ? 'background: #ec5b13; color: white;' : ''}">${isAI ? 'AI Deep Learning' : '통계 알고리즘'}</div>
                    `;
                    container.appendChild(card);
                });
            }
        });
    </script>
</body>
</html>
